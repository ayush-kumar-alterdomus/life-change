server:
  port: 8080

spring:
  application:
    name: ascend-backend
  profiles:
    active: dev

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: true

  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# Firebase configuration
firebase:
  enabled: ${FIREBASE_ENABLED:false}
  project-id: ${FIREBASE_PROJECT_ID:ascend-dev}
  credentials-file: ${FIREBASE_CREDENTIALS_FILE:firebase-service-account.json}

# Application security
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  rate-limit:
    enabled: true
    buckets:
      - name: auth
        path-pattern: /api/v1/auth/**
        max-requests: 10
        window-seconds: 60
      - name: quest-completion
        path-pattern: /api/v1/quests/*/complete
        max-requests: 20
        window-seconds: 60
      - name: guild-chat
        path-pattern: /api/v1/guilds/*/chat
        max-requests: 30
        window-seconds: 60
      - name: general-api
        path-pattern: /api/v1/**
        max-requests: 100
        window-seconds: 60

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

---
# Development Profile
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/ascend_dev
    username: ascend
    password: ascend_dev_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    com.ascend: DEBUG
    org.springframework.web: DEBUG

---
# Staging Profile
spring:
  config:
    activate:
      on-profile: staging

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}

logging:
  level:
    com.ascend: INFO

---
# Production Profile
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}

logging:
  level:
    com.ascend: WARN
    root: INFO

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://ascend.app}

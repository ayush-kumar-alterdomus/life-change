<div class="xp-progress-card" aria-label="XP Progress">
  <span class="xp-progress-card__level" [attr.aria-label]="'Level ' + currentLevel()">
    {{ currentLevel() }}
  </span>

  <div class="xp-progress-card__bar">
    <app-xp-progress-bar
      [currentXp]="currentXp()"
      [requiredXp]="requiredXp()"
    />
  </div>

  <span class="xp-progress-card__text">
    {{ formattedXp() }}
  </span>
</div>

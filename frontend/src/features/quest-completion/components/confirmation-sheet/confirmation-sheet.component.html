<div class="sheet-backdrop" (click)="onCancel()">
  <div
    class="sheet-container"
    @slideUp
    (click)="$event.stopPropagation()"
    (swipedown)="onSwipeDown()"
    cdkTrapFocus
    cdkTrapFocusAutoCapture
  >
    <!-- Drag handle -->
    <div class="drag-handle" aria-hidden="true"></div>

    <!-- Quest details -->
    <section class="quest-details">
      <h2 class="quest-title">{{ quest().title }}</h2>
      <p class="quest-description">{{ quest().description }}</p>

      <div class="quest-meta">
        <span class="difficulty-badge" [attr.data-difficulty]="quest().difficulty">
          {{ quest().difficulty }}
        </span>
        <span class="stat-type">
          <ion-icon name="fitness-outline"></ion-icon>
          {{ quest().statType }}
        </span>
      </div>

      <div class="xp-preview">
        <span class="xp-value">+{{ quest().xpReward }} XP</span>
      </div>
    </section>

    <!-- Error banner -->
    @if (errorMessage()) {
      <div class="error-banner" role="alert">
        {{ errorMessage() }}
      </div>
    }

    <!-- Actions -->
    <div class="sheet-actions">
      <button
        class="btn-complete"
        [attr.aria-label]="completeButtonAriaLabel()"
        [disabled]="isSubmitting()"
        (click)="onConfirm()"
      >
        @if (isSubmitting()) {
          <ion-spinner name="crescent"></ion-spinner>
        } @else {
          Complete Quest
        }
      </button>

      <button
        class="btn-cancel"
        (click)="onCancel()"
        [disabled]="isSubmitting()"
      >
        Cancel
      </button>
    </div>
  </div>
</div>

<ion-content [fullscreen]="true" class="splash-content" scroll-y="false">
  <div class="splash-background">
    <!-- Animated glowing particles -->
    <div class="particle particle--1"></div>
    <div class="particle particle--2"></div>
    <div class="particle particle--3"></div>
    <div class="particle particle--4"></div>
    <div class="particle particle--5"></div>
    <div class="particle particle--6"></div>
    <div class="particle particle--7"></div>
    <div class="particle particle--8"></div>
  </div>

  <div class="splash-container">
    <!-- Ascend Logo -->
    <div class="splash-logo" aria-label="Ascend logo">
      <span class="splash-logo__text">ASCEND</span>
      <div class="splash-logo__glow"></div>
    </div>

    <!-- Subtext -->
    <p class="splash-subtext">Enter Arc Mode</p>

    <!-- Loading Indicator (pulsing dots) -->
    <div class="splash-loader" aria-label="Loading">
      <span class="splash-loader__dot"></span>
      <span class="splash-loader__dot"></span>
      <span class="splash-loader__dot"></span>
    </div>
  </div>
</ion-content>
